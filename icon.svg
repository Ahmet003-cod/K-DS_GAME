<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFDEE9" />
      <stop offset="100%" stop-color="#B5FFFC" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="10" stdDeviation="15" flood-color="#000" flood-opacity="0.1" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="128" fill="url(#bgGrad)" />

  <!-- Cute Child Face Vector -->
  <g filter="url(#shadow)">
    <!-- Face -->
    <circle cx="256" cy="280" r="140" fill="#FFD2B8" />
    
    <!-- Hair back -->
    <path d="M 116 280 C 116 100 396 100 396 280 Z" fill="#6B4226" />
    
    <!-- Hair bangs -->
    <path d="M 106 240 Q 186 160 256 220 Q 326 160 406 240 C 406 140 356 120 256 120 C 156 120 106 140 106 240 Z" fill="#4A2A14" />
    
    <!-- Eyes -->
    <circle cx="196" cy="270" r="16" fill="#333" />
    <circle cx="316" cy="270" r="16" fill="#333" />
    
    <!-- Eye sparkles -->
    <circle cx="190" cy="264" r="5" fill="#FFF" />
    <circle cx="310" cy="264" r="5" fill="#FFF" />

    <!-- Cheeks -->
    <circle cx="156" cy="300" r="22" fill="#FF8A80" opacity="0.45" />
    <circle cx="356" cy="300" r="22" fill="#FF8A80" opacity="0.45" />

    <!-- Big Happy Smile -->
    <path d="M 216 320 Q 256 360 296 320" fill="none" stroke="#333" stroke-width="12" stroke-linecap="round" />
  </g>
</svg>
