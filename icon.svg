<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFDEE9" />
      <stop offset="100%" stop-color="#B5FFFC" />
    </linearGradient>
    <!-- Sun Gradient -->
    <linearGradient id="sunGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFE000" />
      <stop offset="100%" stop-color="#799F0C" />
    </linearGradient>
    <radialGradient id="sunSoft" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFB300" />
      <stop offset="100%" stop-color="#F57C00" />
    </radialGradient>
    <!-- Cloud Gradient -->
    <linearGradient id="cloudGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" />
      <stop offset="100%" stop-color="#ECEFF1" />
    </linearGradient>
    <!-- Drop Shadow -->
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="2" dy="8" stdDeviation="8" flood-color="#37474F" flood-opacity="0.15" />
    </filter>
  </defs>

  <!-- Rounded App Icon Background -->
  <rect width="512" height="512" rx="128" fill="url(#bgGrad)" />

  <!-- Decorative Sparkles/Stars -->
  <path d="M 120,100 L 125,115 L 140,120 L 125,125 L 120,140 L 115,125 L 100,120 L 115,115 Z" fill="#FFF" opacity="0.8" />
  <path d="M 400,380 L 403,390 L 413,393 L 403,396 L 400,406 L 397,396 L 387,393 L 397,390 Z" fill="#FFEB3B" opacity="0.9" />

  <!-- Group with Shadow -->
  <g filter="url(#shadow)">
    <!-- Cute Sun -->
    <circle cx="300" cy="200" r="100" fill="url(#sunSoft)" />
    <!-- Sun Rays (Smiling Sun) -->
    <g stroke="#F57C00" stroke-width="12" stroke-linecap="round">
      <line x1="300" y1="70" x2="300" y2="40" />
      <line x1="300" y1="330" x2="300" y2="360" />
      <line x1="170" y1="200" x2="140" y2="200" />
      <line x1="430" y1="200" x2="460" y2="200" />
      <line x1="208" y1="108" x2="187" y2="87" />
      <line x1="392" y1="292" x2="413" y2="313" />
      <line x1="208" y1="292" x2="187" y2="313" />
      <line x1="392" y1="108" x2="413" y2="87" />
    </g>
    <!-- Sun Eyes -->
    <circle cx="270" cy="180" r="10" fill="#263238" />
    <circle cx="330" cy="180" r="10" fill="#263238" />
    <!-- Sun Rosy Cheeks -->
    <circle cx="250" cy="200" r="12" fill="#FF8A80" opacity="0.6" />
    <circle cx="350" cy="200" r="12" fill="#FF8A80" opacity="0.6" />
    <!-- Sun Smile -->
    <path d="M 285 210 Q 300 230 315 210" fill="none" stroke="#263238" stroke-width="8" stroke-linecap="round" />

    <!-- Cute Fluffy Cloud overlapping the sun -->
    <path d="M 140 360 
             A 60 60 0 0 1 170 250 
             A 80 80 0 0 1 310 230 
             A 70 70 0 0 1 400 310 
             A 55 55 0 0 1 380 410 
             L 140 410 Z" fill="url(#cloudGrad)" />
             
    <!-- Cloud Eyes -->
    <circle cx="230" cy="320" r="8" fill="#37474F" />
    <circle cx="290" cy="320" r="8" fill="#37474F" />
    <!-- Cloud Smile -->
    <path d="M 250 340 Q 260 350 270 340" fill="none" stroke="#37474F" stroke-width="6" stroke-linecap="round" />
    <!-- Cloud Cheeks -->
    <circle cx="215" cy="335" r="8" fill="#FF8A80" opacity="0.5" />
    <circle cx="305" cy="335" r="8" fill="#FF8A80" opacity="0.5" />
  </g>
</svg>
